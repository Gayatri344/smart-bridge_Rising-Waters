<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floods Prediction - Telemetry Entrance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
</head>
<body>

<div class="header">
    <div class="logo">🌊 Floods Prediction</div>
    <div class="nav-links"><a href="/">Home</a></div>
</div>

<div class="content-wrapper" style="margin-top: 40px;">
    <div class="card">
        <h2>Environmental Telemetry Parameters</h2>
        <p style="margin-bottom: 2rem; font-size: 0.95rem;">Input structural meteorological metrics to evaluate localized flash inundation probabilities.</p>
        
        <form action="/submit" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Cloud Cover (%)</label>
                    <input type="number" step="any" name="v1" placeholder="e.g. 35.4" required>
                </div>
                <div class="form-group">
                    <label>Annual Rain Fall (mm)</label>
                    <input type="number" step="any" name="v2" placeholder="e.g. 1200" required>
                </div>
                <div class="form-group">
                    <label>Jan-Feb Rainfall (mm)</label>
                    <input type="number" step="any" name="v3" placeholder="e.g. 45.2" required>
                </div>
                <div class="form-group">
                    <label>March-May Rainfall (mm)</label>
                    <input type="number" step="any" name="v4" placeholder="e.g. 110" required>
                </div>
                <div class="form-group">
                    <label>June-September Rainfall (mm)</label>
                    <input type="number" step="any" name="v5" placeholder="e.g. 680" required>
                </div>
            </div>
            <button type="submit" class="btn">Execute Prediction Model</button>
        </form>
    </div>
</div>

</body>
</html>
